<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style/style.css" />
    <title>Result</title>
  </head>
  <body class="page-container">
    <div class="card">
      <header class="brand-bg text-center py-12">
        <img
          src="/images/CYF-logo.png"
          alt="CV Matching Game Logo"
          class="project-logo"
        />
        <h1 class="text-2xl font-bold">Results</h1>
        <p class="mt-5">Are you ready to see the results?</p>
      </header>
      <main class="card-body">
        <section>
          <div class="border-2 border-gray-300 rounded-xl p-4 text-center">
            total statement: 4
          </div>
        </section>
        <section class="space-y-6">
          <div class="result-item">
            <div class="statement-card">Statement 1</div>
            <div class="score-card">
              <p class="font-semibold">Score: 10</p>
              <p class="text-sm">Result: Personal</p>
            </div>
          </div>

          <div class="result-item">
            <div class="statement-card">Statement 2</div>
            <div class="score-card">
              <p class="font-semibold">Score: 10</p>
              <p class="text-sm">Result: Personal</p>
            </div>
          </div>

          <div class="result-item">
            <div class="statement-card">Statement 3</div>
            <div class="score-card">
              <p class="font-semibold">Score: 10</p>
              <p class="text-sm">Result: Personal</p>
            </div>
          </div>

          <div class="result-item">
            <div class="statement-card">Statement 4</div>
            <div class="score-card">
              <p class="font-semibold">Score: 10</p>
              <p class="text-sm">Result: Personal</p>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/js/result.js"></script>
  </body>
</html>
