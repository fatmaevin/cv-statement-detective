<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Waiting Room</title>
  <link rel="stylesheet" href="/style/style.css" />
</head>

<body class="page-container">

  <div class="card">
    <header class="brand-bg text-center py-6">
      <h1 class="text-2xl font-bold">CV Personal Statement Game</h1>
      <p class="opacity-90">Waiting Room</p>
    </header>

    <main class="card-body">

      <section>
        <h2 class="waiting-title">Waiting for the game to start...</h2>
        <p class="waiting-subtext">
          The volunteer will start the game when everyone has joined.
        </p>
      </section>

      <section>
        <h3 class="players-title">Players in the room</h3>

        <ul class="players-grid">
          <li class="player-item">Fatma</li>
          <li class="player-item">Sheida</li>
          <li class="player-item">Fred</li>
          <li class="player-item">Suraj</li>
        </ul>

        <p class="note-text">4 players joined</p>
      </section>

      <section class="start-section">
        <button class="brand-button" disabled>Start Game</button>
        <p class="note-text">
          Button will enable once all trainees submit their statements.
        </p>
      </section>

    </main>
  </div>

</body>
</html>
