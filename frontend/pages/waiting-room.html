<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiting Room</title>
    <link rel="stylesheet" href="/style/style.css" />
  </head>

<body class="page-container">

  <div class="card">
    <header class="brand-bg text-center py-6">
      <img
          src="/images/CYF-logo.png"
          alt="CV Matching Game Logo"
          class="project-logo"
      />
      <h1 class="text-2xl font-bold">CV Personal Statement Game</h1>
      <p class="opacity-90">Waiting Room</p>
    </header>

    <main class="card-body">

      <section>
        <h2 class="waiting-title">Waiting for the game to start...</h2>
        <p class="text-center">
          The volunteer will start the game when everyone has joined.
        </p>
      </section>

      <section>
        <h3 class="players-title"></h3>
        <ul class="players-grid" id="playersList"></ul>
        <p class=""note-text" id="playersCount"></p>
      </section>

      <section class="start-section">
        <button id="startGameBtn" class="brand-button" disabled>
         Start Game
        </button>
        <p class="note-text">
          Button will enable once all trainees submit their statements.
        </p>
      </section>

    </main>
  </div>

</body>
</html>
