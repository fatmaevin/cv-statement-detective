<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join Game</title>
    <link rel="stylesheet" href="/style/style.css" />
  </head>
  <body class="bg-gray-250">
    <!-- Logo -->
    <img
      src="/images/CYF-logo.png"
      alt="Code Your Future Logo"
      class="w-40 absolute top-1 left-1"
    />

    <!-- Page heading -->
    <h1 class="text-3xl font-bold text-blue-900 text-center mt-10">
      Join the Game
    </h1>

    <p class="text-center mt-5 text-gray-700">
      Enter your details below to join the game.
    </p>

    <!-- Form -->
    <form
      id="userJoinForm"
      class="mt-8 w-200 mx-auto bg-gray-100 p-10 rounded shadow-lg border-2 border-blue-500"
    >
      <!-- Optional Passcode -->
      <input
        type="text"
        id="passcodeInput"
        placeholder="Enter passcode (optional)"
        class="border-2 border-blue-500 rounded py-2 px-4 w-full mb-4 focus:outline-none focus:border-red-500"
      />

      <!-- Name input -->
      <input
        type="text"
        id="nameInput"
        placeholder="Enter your name"
        class="border-2 border-blue-500 rounded py-2 px-4 w-full mb-4 focus:outline-none focus:border-red-500"
        required
      />

      <!-- Personal Statement textarea -->
      <textarea
        id="psInput"
        placeholder="Enter your personal statement"
        class="border-2 border-blue-500 rounded py-2 px-4 w-full mb-4 focus:outline-none focus:border-red-500"
        rows="6"
        required
        maxlength="500"
      ></textarea>

      <!-- Submit button -->
      <button
        type="submit"
        class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded block mx-auto"
      >
        Submit
      </button>
    </form>
  </body>
</html>
