<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join Game</title>
    <link rel="stylesheet" href="/style/style.css" />
  </head>
  <body class="page-container">
   <div class="card">
      <header class="brand-bg text-center py-6">
        <img
          src="/images/CYF-logo.png"
          alt="CV Matching Game Logo"
          class="project-logo"
        />
        <h1 class="text-2xl font-bold">CV Personal Statement Game</h1>
        <p class="opacity-90">Join the Game</p>
      </header>
 
    <main class="card-body">
     <p class="text-center text-gray-700 opacity-90 mt-2">
      Enter your details below to join the game.
    </p>

    <!-- Form -->
    <form
      id="userJoinForm"
     class="mt-6 space-y-4"
    >
      <!-- Optional Passcode -->
      <input
        type="text"
        id="passcodeInput"
        placeholder="Enter passcode (optional)"
        aria-label="passcode"
        class="border-2 brand-border rounded py-2 px-4 w-full mb-4"
      />

      <!-- Name input -->
      <input
        type="text"
        id="nameInput"
        placeholder="Enter your name"
        aria-label="nameInput"
        class="border-2 brand-border rounded py-2 px-4 w-full mb-4"
        required
      />

      <!-- Personal Statement textarea -->
      <textarea
        id="psInput"
        placeholder="Enter your personal statement"
        aria-label="psInput"
        class="border-2 brand-border rounded py-2 px-4 w-full mb-4"
        rows="10"
        required
        maxlength="500"
      ></textarea>

      <!-- Submit button -->
      <button
        type="submit"
        class="brand-button mx-auto block mt-6"
      >
        Submit
      </button>
    </form>
    </main>
    <script type="module" src="/js/joinGame.js"></script>
  </body>
</html>
