<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join Game</title>
    <link rel="stylesheet" href="/style/style.css" />
  </head>
  <body class="page-container">
   <div class="card">
    <header class="brand-bg text-center py-6 text-white">
      <img
        src="/images/CYF-logo.png"
        alt="CV Matching Game Logo"
        class="project-logo"
      />
      <h1 class="text-2xl font-bold">CV Personal Statement Game</h1>
      <p>Join the Game</p>
    </header>
 
    <main class="card-body">
      <div id="alert-container" class="space-y-2 mb-4"></div>
      <p class="text-center text-gray-900 mt-2">
      Enter your details below to join the game.
    </p>

    <!-- Form -->
    <form
      id="userJoinForm"
     class="mt-6 space-y-4"
    >
      <!-- Name input -->
      <input
        type="text"
        id="nameInput"
        placeholder="Enter your name"
        aria-label="nameInput"
        class="border brand-border rounded py-2 px-4 w-full mb-4"
        
      />  
    
    <!-- Optional Passcode -->
      <input
        type="text"
        id="passcodeInput"
        placeholder="Enter passcode (optional)"
        aria-label="passcode"
        class="border brand-border rounded py-2 px-4 w-full mb-4"
      />



      <!-- Personal Statement textarea -->
      <textarea
        id="psInput"
        placeholder="Enter your personal statement"
        aria-label="psInput"
        class="border brand-border rounded py-2 px-4 w-full mb-4"
        rows="10"
        maxlength="500"
      ></textarea>

      <!-- Submit button -->
      <button
        type="submit"
        class="brand-button mx-auto block mt-6"
      >
        Submit
      </button>
    </form>
    </main>

    <!-- MODAL ROOT -->
<div
  id="modal-root"
  class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50"
>
  <div class="bg-white rounded-xl shadow-lg w-full max-w-md p-6 space-y-4">

    <h2 id="modal-title" class="text-lg font-semibold text-gray-800"></h2>

    <p id="modal-message" class="text-gray-600 break-all whitespace-pre-wrap"></p>

    <div class="flex justify-end gap-3 pt-4">
      <button
        id="modal-cancel"
        class="px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300"
      >
        Cancel
      </button>

      <button
        id="modal-ok"
        class="px-4 py-2 rounded-lg bg-green-600 text-white hover:bg-green-700"
      >
        OK
      </button>
    </div>

  </div>
</div>

    <script type="module" src="/js/joinGame.js"></script>
  </body>
</html>
