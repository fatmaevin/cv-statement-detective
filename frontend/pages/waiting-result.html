<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waiting Room for Results</title>
    <link rel="stylesheet" href="/style/style.css" />
  </head>
  <body class="min-h-screen bg-white flex flex-col items-center">
    <header class="brand-bg w-full text-center py-15">
      <h1 class="text-2xl font-bold">Waiting Room for Results</h1>
    </header>

    <div class="mt-60 w-full">
      <div class="card-body">
        <p class="text-center text-gray-600">
          Please wait while the results are being calculated.
        </p>
        <div>
          <h3 class="players-title">Players in the room</h3>

          <ul class="players-grid">
            <li class="player-item">Fatma</li>
            <li class="player-item">Sheida</li>
            <li class="player-item">Fred</li>
            <li class="player-item">Suraj</li>
          </ul>

          <p class="note-text">4 players waiting for results</p>
        </div>
        <div class="flex justify-center mt-4">
          <button class="brand-button w-50">Show Result</button>
        </div>
        <p class="note-text flex justify-center">
          Button will be enable once all results are calculated
        </p>
      </div>
    </div>
  </body>
</html>
