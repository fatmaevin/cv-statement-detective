<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waiting Room for Results</title>
    <link rel="stylesheet" href="/style/style.css" />
  </head>
  <body class="page-container">
    <div class="card">
      <header class="brand-bg text-center py-6">
        <img
          src="/images/CYF-logo.png"
          alt="CV Matching Game Logo"
          class="project-logo"
        />
        <h1 class="text-2xl font-bold">Waiting Room for Results</h1>
      </header>
      <main class="card-body">
        <section>
          <p class="text-center text-gray-600">
            Please wait while the results are being calculated.
          </p>
        </section>
        <section>
          <h3 class="players-title">Players in the room</h3>

          <ul class="players-grid">
            <li class="player-item">Fatma</li>
            <li class="player-item">Sheida</li>
            <li class="player-item">Fred</li>
            <li class="player-item">Suraj</li>
          </ul>
        </section>
        <section class="start-section">
          <button class="brand-button" disabled>Show Result</button>
          <p class="note-text flex justify-center">
            Button will be enable once all results are calculated
          </p>
        </section>
      </main>
    </div>
  </body>
</html>
