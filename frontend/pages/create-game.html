<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Game Page</title>
    <link rel="stylesheet" href="/style/style.css" />
  </head>

  <body class="page-container">
    <div class="card">
      <header class="brand-bg text-center py-6 text-gray-900">
        <img
          src="/images/CYF-logo.png"
          alt="CV Matching Game Logo"
          class="project-logo"
        />
        <h1 class="text-2xl font-bold">CV Personal Statement Game</h1>
        <p>Create Your Game</p>
      </header>

      <main class="card-body">
        <div id="alert-container" class="space-y-2 mb-4"></div>
        <p class="text-center text-gray-900 mt-4">
          This game helps match personal statements with job requirements in a
          fun way!
        </p>

        <form id="createLinkForm" class="mt-6 space-y-4">
          <!-- Input player name -->
          <input
            type="text"
            id="playerName"
            aria-label="playerName"
            placeholder="Enter your name"
            required
            class="border-2 brand-border rounded py-2 px-4 w-full focus:outline-none focus:ring-2 focus:ring-blue-400"
          />

          <!--Optional Passcode + Duration row -->
          <div class="flex gap-4">
            <!-- Passcode -->
            <input
              type="text"
              id="passcodeInput"
              aria-label="Passcode"
              placeholder="Enter passcode (optional)"
              class="border-2 brand-border rounded py-2 px-4 w-full focus:outline-none focus:ring-2 focus:ring-blue-400"
            />
            <!-- Duration -->
            <div class="w-1/2">
              <label class="block mb-1 text-sm text-gray-700">
                Statement time limit
              </label>

              <div class="relative">
                <input
                  type="number"
                  id="durationInput"
                  aria-label="Statement time limit"
                  placeholder="e.g. 120"
                  min="10"
                  step="1"
                  class="border-2 brand-border rounded py-2 px-4 w-full pr-20 focus:outline-none focus:ring-2 focus:ring-blue-400"
                />

                <span
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm"
                >
                  seconds
                </span>
              </div>
            </div>
          </div>

          <!-- Submit button -->
          <button
            type="submit"
            id="generateBtn"
            class="brand-button mx-auto block mt-4 disabled:opacity-50 disabled:cursor-not-allowed"
            disabled
          >
            Generate Game Link
          </button>

          <div class="mt-4 w-full">
            <div
              id="gameLinkDisplay"
              style="display: none"
              class="p-4 border-2 brand-border rounded bg-gray-100 text-blue-900 font-medium break-words h-24 overflow-auto"
            >
              Your game link will appear here
            </div>
          </div>
        </form>

        <section
          id="playersSection"
          style="display: none"
          class="mt-8 max-w-md mx-auto card p-4"
        >
          <h2 class="players-title text-center mb-3">Players Joined</h2>
          <ul class="players-grid" aria-live="polite"></ul>
          <div id="noPlayers" class="text-gray-700 text-center mt-2">
            No players joined yet
          </div>
        </section>

        <button
          id="startGameBtn"
          type="button"
          style="display: none"
          class="brand-button mx-auto block mt-4"
          disabled
        >
          Click to start the game!
        </button>

        <button
          id="finishGameBtn"
          type="button"
          style="display: none"
          class="brand-button mx-auto block mt-4"
        >
          Finish the game
        </button>

        <p id="startGameNote" class="note-text text-center mt-2"></p>
      </main>
    </div>

        <!-- MODAL ROOT -->
<div
  id="modal-root"
  class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50"
>
  <div class="bg-white rounded-xl shadow-lg w-full max-w-md p-6 space-y-4">

    <h2 id="modal-title" class="text-lg font-semibold text-gray-800"></h2>

    <p id="modal-message" class="text-gray-600 break-all whitespace-pre-wrap"></p>

    <div class="flex justify-end gap-3 pt-4">
      <button
        id="modal-cancel"
        class="px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300"
      >
        Cancel
      </button>

      <button
        id="modal-ok"
        class="px-4 py-2 rounded-lg bg-green-600 text-white hover:bg-green-700"
      >
        OK
      </button>
    </div>

  </div>
</div>
    <script type="module" src="/js/createGame.js"></script>
  </body>
</html>
