<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Game Page</title>
    <link rel="stylesheet" href="/style/style.css" />
  </head>
  <body class="page-container">
    <div class="card">
      <header class="brand-bg text-center py-6">
        <img
          src="/images/CYF-logo.png"
          alt="CV Matching Game Logo"
          class="w-24 mx-auto mb-2 bg-gray-100 p-2 rounded-lg"
        />
        <h1 class="text-2xl font-bold">CV Personal Statement Game</h1>
        <p class="opacity-90">Create Your Game</p>
      </header>

      <main class="card-body">
        <p class="text-center text-gray-700 opacity-90 mt-4">
          This game helps match personal statements with job requirements in a
          fun way!
        </p>
        <button id="createGameBtn" class="brand-button mx-auto block mt-6">
          Click to create a game
        </button>

        <form id="createLinkForm" class="mt-6 space-y-4">
          <!-- Input optional passcode -->
          <input
            type="text"
            id="passcodeInput"
            aria-label="Passcode"
            placeholder="Enter passcode (optional)"
            class="border border-gray-300 rounded py-2 px-4 w-full focus:outline-none focus:ring-2 focus:ring-blue-400"
          />

          <!--submit button -->
          <button type="submit" class="brand-button mx-auto block mt-4">
            Generate Game Link
          </button>

          <div class="mt-4 w-full">
            <div
              id="gameLinkDisplay"
              class="p-4 border border-gray-300 rounded bg-gray-100 text-blue-700 font-medium break-words h-24 overflow-auto"
            >
              Your game link will appear here
            </div>
          </div>
        </form>
        <section class="mt-8 max-w-md mx-auto card p-4">
          <h2 class="players-title text-center mb-3">Players Joined</h2>
          <ul class="players-grid">
            <li class="player-item">Alice</li>
            <li class="player-item">Bob</li>
          </ul>

          <!-- When no players have joined yet -->
          <div id="noPlayers" class="text-gray-500 text-center mt-2">
            No players joined yet
          </div>
        </section>

        <button id="startGameBtn" class="brand-button mx-auto block mt-4">
          Click to start the game!
        </button>
      </main>
    </div>
  </body>
</html>
