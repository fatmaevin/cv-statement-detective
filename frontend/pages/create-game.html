<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Game Page</title>
    <link rel="stylesheet" href="/style/style.css" />
  </head>
  <body class="bg-gray-250">
    <h1 class="text-3xl text-blue-900 font-bold text-center mt-10">
      Create Your Game
    </h1>
    <img
      src="/images/CYF-logo.png"
      alt="CV Matching Game Logo"
      class="w-40 absolute top-1 left-1"
    />

    <p class="text-center mt-5 text-gray-700">
      This game helps match personal statements with job requirements in a fun
      way!
    </p>
    <button
      class="bg-blue-500 hover:bg-blue-600 text-white text-2xl font-bold py-3 px-6 rounded block mx-auto mt-8"
    >
      Click to start a game
    </button>

    <form
      id="createLinkForm"
      class="mt-8 text-center p-10 border border-gray-300 rounded w-200 mx-auto bg-white shadow-lg"
    >
      <!-- Input optional passcode -->
      <input
        type="text"
        id="passcodeInput"
        placeholder="Enter passcode (optional)"
        class="border border-gray-300 rounded py-2 px-4 w-full mb-4 focus:outline-none focus:ring-2 focus:ring-blue-400"
      />

      <!--submit button -->
      <button
        type="submit"
        class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-6 rounded"
      >
        Generate Game Link
      </button>

      <div class="relative mt-4 w-full">
        
        <div
          id="gameLinkDisplay"
          class="p-4 border border-gray-300 rounded bg-gray-100 text-blue-700 break-words h-24 overflow-auto"
        >
          Your game link will appear here
        </div>

        <button
          id="copyLinkBtn"
          class="absolute top-2 right-2 p-1 rounded bg-gray-200 hover:bg-gray-300"
        >
          <img src="/images/Copy-icon.jpg" alt="Copy Link" class="w-8 h-8" />
        </button>
      </div>
    </form>
  </body>
</html>
